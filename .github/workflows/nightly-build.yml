name: Nightly AI Digest Build

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: '0 2 * * *'
  
  workflow_dispatch:  # Allow manual triggering
  
  push:
    branches:
      - main
    paths:
      - 'generate_summary.py'
      - 'fetch_sources.py'
      - 'template.html'
      - 'config.yaml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper git operations
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Generate AI digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python generate_summary.py
      
      - name: Commit and push summaries
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add generated files (force add for gitignored files)
          git add summaries/*.json
          git add -f public/index.html
          
          # Commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update AI digest - $(date +'%Y-%m-%d')"
            git push
          fi
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-digest-${{ github.run_number }}
          path: |
            public/
            summaries/
          retention-days: 30
      
      - name: Deploy to GitHub Pages (optional)
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
